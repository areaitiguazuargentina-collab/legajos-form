<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Control Colectivos | Panel de Gestión</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="card">
    <header class="main-header">
      <h1>🚌 Control de Colectivos</h1>
      <p class="muted">Sistema de registro y gestión de legajos</p>
    </header>

    <section id="publicSection" class="content-section">
      <div class="section-title">
        <h2>Registro de Ingreso</h2>
      </div>

      <form id="frmIngreso" class="form-group">
        <div class="field">
          <label for="tokens">Legajos a registrar</label>
          <div class="input-wrapper">
            <input id="tokens" maxlength="300" required placeholder="Ej: 1162, 1163, C5..." autocomplete="off" />
          </div>
        </div>

        <div class="row mt-30 btn-container">
          <button id="btnIngreso" type="submit" class="btn-primary">Enviar Registro</button>
          <button id="btnLimpiar" type="button" class="btn-secondary">Limpiar</button>
        </div>

        <div id="msgPublic" class="msg" aria-live="polite"></div>

        <details class="preview-box">
          <summary>🔍 Ver vista previa normalizada</summary>
          <pre id="preview"></pre>
        </details>
      </form>
    </section>

    <hr class="sep" />

    <section id="adminLoginSection" class="content-section">
      <div class="section-title">
        <h2>🔐 Acceso Administración</h2>
      </div>
      <form id="frmAdminLogin" class="form-grid">
        <div class="field">
          <label for="adminEmail">Usuario</label>
          <input id="adminEmail" type="email" placeholder="email@empresa.com" required />
        </div>

        <div class="field">
          <label for="adminPass">Contraseña</label>
          <input id="adminPass" type="password" placeholder="••••••••" required />
        </div>

        <div class="row mt-30 btn-container" style="grid-column: span 2;">
          <button id="btnAdminLogin" type="submit" class="btn-accent">Entrar al Panel</button>
          <button id="btnAdminLogout" type="button" class="btn-danger" style="display:none;">Cerrar Sesión</button>
        </div>

        <div id="msgAdmin" class="msg" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <script src="./firebase-config.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
